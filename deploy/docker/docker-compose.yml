services:
  postgres:
    profiles: ["db"]
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lowcode}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lowcode}
      POSTGRES_DB: ${POSTGRES_DB:-lowcode_bpmn}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lowcode} -d ${POSTGRES_DB:-lowcode_bpmn}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  redis:
    profiles: ["redis", "ha"]
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  otel-collector:
    profiles: ["otel"]
    image: otel/opentelemetry-collector-contrib:0.120.0
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4318:4318"

  app:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      HTTP_ADDR: ${HTTP_ADDR:-:8080}
      STORE_BACKEND: ${STORE_BACKEND:-db}
      STORE_PATH: ${STORE_PATH:-/data}
      DB_DRIVER: ${DB_DRIVER:-postgres}
      DATABASE_URL: ${DATABASE_URL:-postgres://lowcode:lowcode@postgres:5432/lowcode_bpmn?sslmode=disable}
      ASYNC_EXECUTION: ${ASYNC_EXECUTION:-true}
      WORKER_INTERVAL: ${WORKER_INTERVAL:-500ms}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-lowcode-bpmn}
      SERVICE_VERSION: ${SERVICE_VERSION:-dev}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      EVENT_CONSUMER: ${EVENT_CONSUMER:-memory}
      EVENT_REDIS_URL: ${EVENT_REDIS_URL:-redis://redis:6379/0}
      PLUGIN_ASSIGNEE_ADAPTERS: ${PLUGIN_ASSIGNEE_ADAPTERS:-generic,canonical,feishu,wecom}
      PLUGIN_TRIGGER_ADAPTERS: ${PLUGIN_TRIGGER_ADAPTERS:-generic,canonical,feishu,wecom,airtable}
      PLUGIN_TASK_ADAPTERS: ${PLUGIN_TASK_ADAPTERS:-generic,canonical,feishu,wecom}
      PLUGIN_CONTROL_ADAPTERS: ${PLUGIN_CONTROL_ADAPTERS:-generic,canonical}
      AUTH_REQUIRED: ${AUTH_REQUIRED:-false}
      API_KEY: ${API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      redis:
        condition: service_healthy
        required: false
    volumes:
      - filestore_data:/data

volumes:
  postgres_data:
  filestore_data:
